name: Close Blank Issues

on:
  issues:
    types: [opened]

jobs:
  close-blank-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const templateMarkers = ['问题描述', '功能描述'];
            const usedTemplate = body && templateMarkers.some(marker => body.includes(marker));

            if (!usedTemplate) {
              const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: [
                  '感谢你的反馈！此 Issue 未使用官方模板，已自动关闭。',
                  '请点击下方链接重新提交，并选择对应的模板填写完整信息：',
                  '',
                  `- 🐛 [Bug 报告](${repoUrl}/issues/new?template=bug-report.yml)`,
                  `- ✨ [功能请求](${repoUrl}/issues/new?template=feature-request.yml)`,
                  '',
                  '---',
                  '',
                  'Thanks for your feedback! This issue was closed because it was not submitted using the official template.',
                  'Please resubmit using one of the templates below:',
                  '',
                  `- 🐛 [Bug Report](${repoUrl}/issues/new?template=bug-report.yml)`,
                  `- ✨ [Feature Request](${repoUrl}/issues/new?template=feature-request.yml)`,
                ].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
              });
            }
